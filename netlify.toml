[[redirects]]
  from = "/storage.html"
  to = "https://vivotoday.com/storage"
  status = 301
  force = true

[[redirects]]
  from = "/wholesale.html"
  to = "https://vivotoday.com/wholesale"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "https://vivotoday.com/contact"
  status = 301
  force = true

# Everything else — the root, research-*.html articles, certificate detail
# pages, signin/checkout, sitemap.xml, robots.txt, and all assets — forwards
# to the live homepage.
[[redirects]]
  from = "/*"
  to = "https://vivotoday.com/"
  status = 301
  force = true
